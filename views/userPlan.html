<!DOCTYPE html>
<html>
<head>
<title>Trip Planner</title>
</head>

<body>

<h2>Plan Your Trip</h2>

<form action="/user/Hotels/display" method="POST">

<label>State</label>
<select id="state" name="state" required>
<option value="">Select State</option>
<option value="karnataka">Karnataka</option>
<option value="kerala">Kerala</option>
<option value="goa">Goa</option>
<option value="rajasthan">Rajasthan</option>
<option value="himachal">Himachal Pradesh</option>
<option value="uttarakhand">Uttarakhand</option>
<option value="tamilnadu">Tamil Nadu</option>
<option value="maharashtra">Maharashtra</option>
<option value="gujarat">Gujarat</option>
<option value="andhra">Andhra Pradesh</option>
</select>

<br><br>

<label>District</label>
<select id="district" name="district" required>
<option value="">Select District</option>
</select>

<br><br>

<label>Travel Type</label><br>
<input type="radio" id="budget" name="travelType" value="budget" checked>
<label for="budget">Budget — best value</label>
&nbsp;&nbsp;
<input type="radio" id="luxury" name="travelType" value="luxury">
<label for="luxury">Luxury — best rated</label>

<br><br>

<label>Check-in Date</label>
<input type="date" id="checkin" name="checkin" required>

<br><br>

<label>Check-out Date</label>
<input type="date" id="checkout" name="checkout" required>

<br><br>

<label>Number of People</label>
<input type="number" id="people" name="people" min="1" placeholder="Enter number of people" required>

<br><br>

<button type="submit">Search Hotels</button>

</form>

<script>

const districts = {
  karnataka:   ["Bangalore Urban", "Mysore", "Mangalore", "Udupi", "Hubli", "Coorg", "Hassan", "Hampi"],
  kerala:      ["Kochi", "Trivandrum", "Kozhikode", "Thrissur", "Munnar", "Alleppey", "Wayanad"],
  goa:         ["North Goa", "South Goa"],
  rajasthan:   ["Jaipur", "Jodhpur", "Udaipur", "Jaisalmer", "Pushkar", "Ranthambore"],
  himachal:    ["Shimla", "Manali", "Dharamshala", "Kasol", "Spiti"],
  uttarakhand: ["Rishikesh", "Haridwar", "Mussoorie", "Nainital", "Jim Corbett", "Auli"],
  tamilnadu:   ["Chennai", "Ooty", "Kodaikanal", "Madurai", "Rameswaram"],
  maharashtra: ["Mumbai", "Pune", "Lonavala", "Aurangabad", "Mahabaleshwar"],
  gujarat:     ["Ahmedabad", "Surat", "Dwarka", "Somnath", "Gir"],
  andhra:      ["Visakhapatnam", "Tirupati", "Vijayawada", "Araku Valley"]
}

const stateDropdown    = document.getElementById("state")
const districtDropdown = document.getElementById("district")

// Set today as minimum date for check-in
const today = new Date().toISOString().split("T")[0]
document.getElementById("checkin").setAttribute("min", today)
document.getElementById("checkout").setAttribute("min", today)

// Prevent checkout being before checkin
document.getElementById("checkin").addEventListener("change", function() {
  document.getElementById("checkout").setAttribute("min", this.value)
})

stateDropdown.addEventListener("change", function() {
  const selectedState = this.value
  districtDropdown.innerHTML = '<option value="">Select District</option>'

  if (!selectedState || !districts[selectedState]) return

  districts[selectedState].forEach(function(district) {
    const option = document.createElement("option")
    option.value = district
    option.text  = district
    districtDropdown.appendChild(option)
  })
})

</script>

</body>
</html>
